<script>
// Define the URL
const url = "https://accounts.2k.com/v2/signup";

// Create a Fetch Request for a GET request
const request = new Request(url, {
  method: 'GET',
  headers: {
    'Content-Type': 'application/json',
  },
  credentials: 'include', // Include browser cookies for authentication (if needed)
});

// Perform the GET request
fetch(request)
  .then(response => response.json())
  .then(data => {
    // Extract and display relevant information from the response
    const email = data.email;

    // Print the email in the console
    console.log("Email:", email);

    // Show a popup with the email
    alert("Email: " + email);
  })
  .catch(error => {
    console.error('Error:', error);
  });
</script>
