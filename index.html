<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaMask Ethers.js Example</title>
</head>

<body>

    <h1>MetaMask Ethers.js Example</h1>
    
    <button onclick="connectAndSign()">Connect and Sign</button>

    <script src="https://cdn.ethers.io/lib/ethers-5.0.umd.min.js"></script>

    <script>
        async function connectAndSign() {
            // Check if MetaMask is installed
            if (window.ethereum) {
                console.log('MetaMask is installed!');

                // Request account access
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    console.log('Connected to MetaMask:', accounts[0]);

                    // Use Ethers.js to sign a message
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    const signer = provider.getSigner();
                    
                    const message = 'Hello, MetaMask! This is a test message.';
                    const signature = await signer.signMessage(message);

                    console.log('Message signed! Signature:', signature);
                    alert('Message signed! Signature: ' + signature);
                } catch (error) {
                    console.error(error);
                }
            } else {
                console.error('MetaMask is not installed!');
            }
        }
    </script>

</body>

</html>
