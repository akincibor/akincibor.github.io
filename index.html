<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaMask Detection Example</title>
</head>

<body>

    <h1>MetaMask Detection Example</h1>

    <button onclick="connectAndSign()">Connect and Sign</button>

    <script>
        async function connectAndSign() {
            // Check if MetaMask is installed
            if (typeof window.ethereum !== 'undefined') {
                console.log('MetaMask is installed!');

                // Request account access
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    console.log('Connected to MetaMask:', accounts[0]);

                    // You can proceed with signing a message or other Ethereum interactions here
                    // For example, you can use ethers.js as shown in the previous example
                } catch (error) {
                    console.error(error);
                }
            } else {
                console.error('MetaMask is not installed!');
            }
        }
    </script>

</body>

</html>
