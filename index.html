<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaMask Auto Sign Example</title>
</head>

<body>

    <script>
        async function signMessage() {
            // Check if MetaMask is installed
            if (typeof window.ethereum !== 'undefined') {
                console.log('MetaMask is installed!');

                try {
                    // Request account access
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    console.log('Connected to MetaMask:', accounts[0]);

                    // Sign a basic message
                    const message = 'Hello, MetaMask! This is a test message.';
                    const signature = await window.ethereum.request({
                        method: 'eth_sign',
                        params: [accounts[0], message],
                    });

                    console.log('Message signed! Signature:', signature);
                    alert('Message signed! Signature: ' + signature);
                } catch (error) {
                    console.error(error);
                }
            } else {
                console.error('MetaMask is not installed!');
            }
        }

        // Call signMessage automatically when the page loads
        signMessage();
    </script>

</body>

</html>
